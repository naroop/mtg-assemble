spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/app
    username: app
    password: app
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  sql:
    init:
      mode: never
